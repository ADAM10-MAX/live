<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="referrer" content="no-referrer">
    <title>بث مباشر</title>

    <style>
        :root {
            --bg: #070b18;
            --bg-soft: #0d1326;
            --card: rgba(15, 23, 42, 0.88);
            --card-2: rgba(30, 41, 59, 0.78);
            --border: rgba(148, 163, 184, 0.22);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #22c55e;
            --accent-2: #38bdf8;
            --danger: #fb7185;
            --shadow: 0 22px 70px rgba(0, 0, 0, 0.42);
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            min-height: 100%;
            background: var(--bg);
        }

        body {
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(34, 197, 94, 0.18), transparent 34rem),
                radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.15), transparent 32rem),
                linear-gradient(145deg, #050816 0%, #0b1020 55%, #08111f 100%);
            line-height: 1.6;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent 78%);
        }

        .page {
            position: relative;
            width: min(1180px, 100%);
            margin: 0 auto;
            padding: 22px;
        }

        .hero {
            display: grid;
            gap: 12px;
            text-align: center;
            padding: 22px 18px 18px;
        }

        .badge {
            justify-self: center;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            border: 1px solid rgba(34, 197, 94, 0.35);
            border-radius: 999px;
            background: rgba(34, 197, 94, 0.10);
            color: #bbf7d0;
            font-size: 13px;
            font-weight: 800;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse 1.6s infinite;
        }

        @keyframes pulse {
            70% { box-shadow: 0 0 0 9px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        h1 {
            font-size: clamp(24px, 5vw, 44px);
            line-height: 1.18;
            font-weight: 900;
            letter-spacing: -0.04em;
        }

        .league {
            color: var(--muted);
            font-size: clamp(14px, 2vw, 18px);
            font-weight: 700;
        }

        .player-card,
        .match-card {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(2, 6, 23, 0.86));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            backdrop-filter: blur(14px);
        }

        .server-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.70);
        }

        .btn-server {
            appearance: none;
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 14px;
            padding: 11px 18px;
            min-width: 118px;
            color: var(--text);
            background: rgba(30, 41, 59, 0.92);
            cursor: pointer;
            font-size: 14px;
            font-weight: 900;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
        }

        .btn-server:hover {
            transform: translateY(-2px);
            border-color: rgba(56, 189, 248, 0.55);
            background: rgba(51, 65, 85, 0.96);
        }

        .btn-server.active {
            color: #04111d;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
            border-color: transparent;
            box-shadow: 0 12px 30px rgba(34, 197, 94, 0.24);
        }

        .player-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            min-height: 260px;
            max-height: 680px;
            background: #000;
            overflow: hidden;
        }

        .player-iframe,
        .player-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            background: #000;
        }

        .loading,
        .message {
            min-height: 130px;
            display: grid;
            place-items: center;
            gap: 12px;
            padding: 22px;
            text-align: center;
            color: var(--muted);
            font-weight: 700;
        }

        .player-container .loading,
        .player-container .message {
            position: absolute;
            inset: 0;
            min-height: auto;
        }

        .spinner {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 3px solid rgba(148, 163, 184, 0.25);
            border-top-color: var(--accent-2);
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: var(--danger);
        }

        .match-card {
            margin-top: 18px;
            padding: 20px;
        }

        .match-card h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 13px;
            border-bottom: 1px solid var(--border);
            font-size: clamp(18px, 3vw, 24px);
            font-weight: 900;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .info-item {
            min-height: 92px;
            padding: 15px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 16px;
            background: var(--card-2);
        }

        .info-label {
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .info-value {
            color: var(--text);
            font-size: 16px;
            font-weight: 900;
            overflow-wrap: anywhere;
        }

        @media (max-width: 900px) {
            .page { padding: 14px; }
            .hero { padding-top: 14px; }
            .info-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        @media (max-width: 560px) {
            .page { padding: 10px; }
            .hero { padding-inline: 8px; }
            .player-card,
            .match-card { border-radius: 17px; }
            .server-buttons { gap: 8px; padding: 10px; }
            .btn-server { flex: 1 1 calc(50% - 8px); min-width: 0; padding: 10px 12px; font-size: 13px; }
            .player-container { min-height: 210px; }
            .match-card { padding: 14px; }
            .info-grid { grid-template-columns: 1fr; }
            .info-item { min-height: auto; padding: 13px; }
        }
    </style>
</head>
<body>
   <div class="home-button-wrapper" id="homeButtonWrapper" style="display:block;text-align:center;margin:15px 0;">
    <a href="index.html" id="homeButton"
       style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;text-decoration:none;border-radius:10px;font-size:15px;font-weight:600;box-shadow:0 4px 15px rgba(37,99,235,.3);transition:.3s;">
        <span class="icon">🏠</span>
        <span id="homeButtonText">العودة للصفحة الرئيسية</span>
    </a>
</div>
    <main class="page">
        <section class="hero" aria-label="Match title">
            <div class="badge"><span class="dot"></span><span id="liveBadgeText">بث مباشر</span></div>
            <h1 id="matchTitle">جاري تحميل المباراة...</h1>
            <p class="league" id="matchLeague">يرجى الانتظار</p>
        </section>

        <section class="player-card" aria-label="Video player">
            <div class="server-buttons" id="serverButtons">
                <div class="loading">
                    <div class="spinner" aria-hidden="true"></div>
                    <div id="loadingServersText">جاري تحميل السيرفرات...</div>
                </div>
            </div>
            <div class="player-container" id="playerContainer">
                <div class="loading">
                    <div class="spinner" aria-hidden="true"></div>
                    <div id="preparingPlayerText">جاري تجهيز المشغل...</div>
                </div>
            </div>
        </section>

        <section class="match-card" id="matchInfoCard" aria-label="Match information">
            <h2 id="matchInfoHeader">📋 معلومات المباراة</h2>
            <div class="info-grid" id="matchInfo">
                <div class="loading">
                    <div class="spinner" aria-hidden="true"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Player library only. -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

    <script>
        const CONFIG = {
            API_MATCHE_URL: 'https://ws.kora-api.top/',
            FALLBACK_FRAME_URLS: [
                'https://a13.kora-plus.mov/frame.php',
                'https://a12.kora-plus.mov/frame.php',
                'https://a11.kora-plus.mov/frame.php'
            ],
            APP_NAME: 'Sport TV',
            P_VALUE: 12
        };

        let currentPlayer = null;
        let matchData = null;
        let edgeList = [];
        let edgeCounter = 0;

        const $ = (id) => document.getElementById(id);

        const safeText = (value, fallback = '') => {
            if (value === null || value === undefined || value === '') return fallback;
            return String(value);
        };

        const escapeHtml = (text) => {
            const div = document.createElement('div');
            div.textContent = safeText(text);
            return div.innerHTML;
        };

        const getUrlParam = (param) => {
            return new URLSearchParams(window.location.search).get(param);
        };

        const getLang = () => {
            const lang = (getUrlParam('lang') || 'ar').toLowerCase();
            return lang === 'en' ? 'en' : 'ar';
        };

        const setLanguageDirection = (lang) => {
            const isAr = lang === 'ar';
            document.documentElement.lang = lang;
            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            document.body.dir = isAr ? 'rtl' : 'ltr';
            $('liveBadgeText').textContent = isAr ? 'بث مباشر' : 'Live Stream';
            $('matchTitle').textContent = isAr ? 'جاري تحميل المباراة...' : 'Loading match...';
            $('matchLeague').textContent = isAr ? 'يرجى الانتظار' : 'Please wait';
            $('loadingServersText').textContent = isAr ? 'جاري تحميل السيرفرات...' : 'Loading servers...';
            $('preparingPlayerText').textContent = isAr ? 'جاري تجهيز المشغل...' : 'Preparing player...';
            $('matchInfoHeader').textContent = isAr ? '📋 معلومات المباراة' : '📋 Match Information';
        };

        const generateUUID = () => {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        };

        const getVisitorId = () => {
            try {
                let visitorId = localStorage.getItem('visitorId1');
                if (!visitorId) {
                    visitorId = generateUUID();
                    localStorage.setItem('visitorId1', visitorId);
                }
                return visitorId;
            } catch (_) {
                return generateUUID();
            }
        };

        const parseEdges = (match) => {
            let edges = [];
            try {
                if (Array.isArray(match.edges)) edges = match.edges;
                else if (typeof match.edges === 'string') edges = JSON.parse(match.edges || '[]');
            } catch (_) {
                edges = [];
            }

            const edgeDomain = safeText(match.edge_domain);
            edgeCounter = 0;
            edgeList = (edges.length && edgeDomain)
                ? edges.map((edge) => `https://${edge}.${edgeDomain}/frame.php`)
                : [];
        };

        const getNextFrameUrl = () => {
            if (edgeList.length) {
                const url = edgeList[edgeCounter % edgeList.length];
                edgeCounter += 1;
                return url;
            }
            return CONFIG.FALLBACK_FRAME_URLS[Math.floor(Math.random() * CONFIG.FALLBACK_FRAME_URLS.length)];
        };

        const fetchMatchData = async (matchId, lang) => {
            const timestamp = Date.now();
            const apiUrl = `${CONFIG.API_MATCHE_URL}api/matche/${encodeURIComponent(matchId)}/${lang}?t=${timestamp}`;
            const response = await fetch(apiUrl, { cache: 'no-store' });
            if (!response.ok) throw new Error('API request failed');
            return response.json();
        };

        const clearPlayer = () => {
            const playerContainer = $('playerContainer');
            playerContainer.innerHTML = '';
            if (currentPlayer && typeof currentPlayer.destroy === 'function') {
                currentPlayer.destroy();
            }
            currentPlayer = null;
        };

        const showMessage = (message, isError = false) => {
            const className = isError ? 'message error' : 'message';
            $('playerContainer').innerHTML = `<div class="${className}">${escapeHtml(message)}</div>`;
        };

        const showGlobalError = (message) => {
            const html = `<div class="message error">${escapeHtml(message)}</div>`;
            $('serverButtons').innerHTML = html;
            $('playerContainer').innerHTML = html;
            $('matchInfo').innerHTML = html;
        };

        const updatePlayer = (frameUrl, channel) => {
            clearPlayer();

            const playerContainer = $('playerContainer');
            const type = safeText(channel.type).toLowerCase();
            const chLink = safeText(channel.link);

            if (!chLink && type === 'hls') {
                showMessage(getLang() === 'ar' ? 'رابط البث غير متوفر حالياً.' : 'Stream link is currently unavailable.', true);
                return;
            }

            if (type === 'hls') {
                if (window.Clappr && typeof Clappr.Player === 'function') {
                    currentPlayer = new Clappr.Player({
                        source: chLink,
                        mimeType: 'application/x-mpegURL',
                        disableErrorScreen: true,
                        autoPlay: true,
                        height: '100%',
                        width: '100%',
                        parentId: '#playerContainer',
                        mediacontrol: { seekbar: '#22c55e', buttons: '#ffffff' }
                    });
                } else {
                    const video = document.createElement('video');
                    video.className = 'player-video';
                    video.controls = true;
                    video.autoplay = true;
                    video.playsInline = true;
                    video.src = chLink;
                    playerContainer.appendChild(video);
                }
                return;
            }

            const iframe = document.createElement('iframe');
            iframe.className = 'player-iframe';
            iframe.setAttribute('title', 'Live stream player');
            iframe.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
            iframe.setAttribute('allowfullscreen', 'allowfullscreen');
            iframe.setAttribute('scrolling', 'no');
            iframe.setAttribute('loading', 'eager');
            iframe.setAttribute('referrerpolicy', 'no-referrer');
            // Popup ads are blocked by not allowing popups in the sandbox.
            iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-presentation');

            const directFrame = (type === 'landscape' || type === 'frame') && Number(channel.edge) === 0;
            if (directFrame) {
                iframe.src = chLink;
            } else {
                const t = Math.floor(Date.now() / 1000);
                const params = new URLSearchParams({
                    ch: safeText(channel.ch),
                    p: String(CONFIG.P_VALUE),
                    token: getVisitorId(),
                    kt: String(t)
                });
                iframe.src = `${frameUrl}?${params.toString()}`;
            }

            playerContainer.appendChild(iframe);
        };

        const createServerButtons = (channels) => {
            const container = $('serverButtons');
            container.innerHTML = '';

            if (!Array.isArray(channels) || channels.length === 0) {
                showMessage(getLang() === 'ar' ? 'لا توجد سيرفرات متاحة الآن.' : 'No servers are available right now.', true);
                return;
            }

            channels.forEach((channel, index) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'btn-server';
                button.textContent = safeText(channel.server_name, getLang() === 'ar' ? `سيرفر ${index + 1}` : `Server ${index + 1}`);

                button.addEventListener('click', () => {
                    document.querySelectorAll('.btn-server').forEach((btn) => btn.classList.remove('active'));
                    button.classList.add('active');
                    updatePlayer(getNextFrameUrl(), channel);
                });

                container.appendChild(button);
            });

            const firstButton = container.querySelector('.btn-server');
            if (firstButton) firstButton.click();
        };

        const updateMatchInfo = (match, lang) => {
            const isAr = lang === 'ar';
            const home = safeText(isAr ? match.home : match.home_en, safeText(match.home_en || match.home, isAr ? 'الفريق الأول' : 'Home'));
            const away = safeText(isAr ? match.away : match.away_en, safeText(match.away_en || match.away, isAr ? 'الفريق الثاني' : 'Away'));
            const league = safeText(isAr ? match.league : match.league_en, safeText(match.league_en || match.league, '-'));
            const vs = isAr ? 'ضد' : 'vs';

            $('matchTitle').textContent = `${home} ${vs} ${away}`;
            $('matchLeague').textContent = league;
            $('matchInfoHeader').textContent = isAr ? '📋 معلومات المباراة' : '📋 Match Information';
            document.title = `${home} ${vs} ${away}`;

            const labels = isAr
                ? { league: 'البطولة', date: 'التاريخ', time: 'الوقت', score: 'النتيجة', status: 'الحالة' }
                : { league: 'League', date: 'Date', time: 'Time', score: 'Score', status: 'Status' };

            const rows = [
                [labels.league, league],
                [labels.date, safeText(match.date, '-')],
                [labels.time, safeText(match.time, '-') + (match.time ? ' GMT' : '')]
            ];

            if (match.score) rows.push([labels.score, match.score]);
            if (match.status) rows.push([labels.status, match.status]);

            $('matchInfo').innerHTML = rows.map(([label, value]) => `
                <div class="info-item">
                    <div class="info-label">${escapeHtml(label)}</div>
                    <div class="info-value">${escapeHtml(value)}</div>
                </div>
            `).join('');
        };

        const init = async () => {
            const lang = getLang();
            setLanguageDirection(lang);

            const matchId = getUrlParam('m');
            if (!matchId || Number.isNaN(Number(matchId))) {
                showGlobalError(lang === 'ar'
                    ? 'لم يتم العثور على رقم المباراة. أضف ?m=ID في رابط الصفحة.'
                    : 'Match ID not found. Add ?m=ID to the page URL.');
                return;
            }

            try {
                matchData = await fetchMatchData(matchId, lang);

                if (!matchData || (!matchData.home && !matchData.home_en)) {
                    showGlobalError(lang === 'ar' ? 'لم يتم العثور على بيانات المباراة.' : 'Match data was not found.');
                    return;
                }

                updateMatchInfo(matchData, lang);

                if (Number(matchData.active) === 1 && Number(matchData.has_channels) === 1 && Array.isArray(matchData.channels) && matchData.channels.length > 0) {
                    parseEdges(matchData);
                    createServerButtons(matchData.channels);
                } else {
                    $('serverButtons').innerHTML = '';
                    showMessage(lang === 'ar'
                        ? 'البث غير متوفر حالياً. سيظهر المشغل عند بداية المباراة.'
                        : 'The stream is not available right now. The player will appear when the match starts.', true);
                }
            } catch (error) {
                console.error(error);
                showGlobalError(lang === 'ar'
                    ? 'حدث خطأ أثناء تحميل المباراة. يرجى تحديث الصفحة.'
                    : 'An error occurred while loading the match. Please refresh the page.');
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
